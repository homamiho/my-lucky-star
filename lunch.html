<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼？魔法菜單</title>
    <style>
        body { background-color: #fffdf5; font-family: 'Klee One', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #5d4037; }
        .card { background: white; padding: 40px; border-radius: 30px; border: 3px solid #e0e0e0; text-align: center; box-shadow: 0 10px 0 #d7ccc8; width: 300px; }
        #result { font-size: 2rem; margin: 30px 0; min-height: 1.5em; color: #d32f2f; font-weight: bold; }
        .btn { background: #81c784; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #66bb6a; }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .food-icon { font-size: 3rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <span class="food-icon">🍱</span>
    <h2>今天午餐決定是...</h2>
    <div id="result">？？？</div>
    <button class="btn" onclick="pickLunch()">幫我選一個！</button>
</div>

<script>
    const foods = ["便利商店", "排骨便當", "牛肉麵", "燒臘飯", "義大利麵", "健康餐盒", "麥當當", "鍋燒麵", "麻辣燙", "越南河粉", "素食", "自助餐"];
    let isRunning = false;

    function pickLunch() {
        if (isRunning) return;
        isRunning = true;
        const resultDiv = document.getElementById('result');
        let count = 0;
        
        // 模擬拉霸閃動效果
        const timer = setInterval(() => {
            resultDiv.innerText = foods[Math.floor(Math.random() * foods.length)];
            count++;
            if (count > 15) {
                clearInterval(timer);
                isRunning = false;
                resultDiv.innerHTML = "✨ " + resultDiv.innerText + " ✨";
            }
        }, 100);
    }
</script>
</body>
</html>
